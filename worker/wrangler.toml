name = "embyproxy"
main = "dist/index.js"
compatibility_date = "2026-07-06"
account_id = "replace-with-account-id"

workers_dev = true
routes = [
  { pattern = "admin.example.com", custom_domain = true },
  { pattern = "media.example.com/*", zone_name = "example.com" }
]

[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "media_gateway"
database_id = "replace-with-d1-database-id"

[vars]
CF_ACCOUNT_ID = "replace-with-account-id"
CF_ZONE_ID = "replace-with-zone-id"
CF_DOMAIN = "admin.example.com"
CF_DNS_DOMAIN = "media.example.com"
CF_WORKER_NAME = "embyproxy"
TG_REPORT_HOUR = "9"
AUTO_WATCH_MAX_CONCURRENCY = "2"
PREFERRED_IPS_URL = "https://raw.githubusercontent.com/ZhiXuanWang/cf-speed-dns/refs/heads/main/ipTop10.html"

# Set ADMIN_TOKEN, CF_API_TOKEN, TG_BOT_TOKEN and TG_CHAT_ID with wrangler secret.
